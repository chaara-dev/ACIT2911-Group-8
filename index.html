<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css"> 
    <title>Document</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <h2 class="sub">Subscription Manager</h2>
            <button class="account">Account</button>
        </header>
        <div class="stats">
            <div class="stat-box">
                <p class="stat-text">Active Subscription</p>
                <p class="stat-value">4</p>
            </div>
            <div class="stat-box">
                <p class="stat-text">Next Renewal</p>
                <p class="stat-value">8 days</p>
            </div>
            <div class="stat-box">
                <p class="stat-text">Total</p>
                <p class="stat-value">$99/m</p>
            </div>


        </div>
        <div class="action">
            <button>Filter</button>
            <button>Search</button>
            <button class="reminder">Reminder</button>
        </div>
        <div class="cards">
            <div class="card">
                <span>$12</span>
                <span>Netflix</span>
                <span class="badge1">8 days</span>
            </div>
            <div class="card">
                <span>$18</span>
                <span>Youtube</span>
                <span class="badge1">9 days</span>
            </div>
            <div class="card">
                <span>$50</span>
                <span>Microsoft</span>
                <span class="badge2">20 days</span>
            </div>
            <div class="card">
                <span>$19</span>
                <span>Github</span>
                <span class="badge2">28 days</span>
            </div>
        </div>   
    </div>

</body>
</html>
